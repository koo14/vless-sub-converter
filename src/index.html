<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>VLESS 订阅转换器</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrious/4.0.2/qrious.min.js"></script>
</head>
<body class="bg-gray-900 text-gray-200 min-h-screen flex items-center justify-center p-4">
    <div class="bg-gray-800 p-8 rounded-xl shadow-2xl border border-gray-700 w-full max-w-lg">
        <h1 class="text-2xl font-bold mb-2 text-white text-center">VLESS 优选 IP/域名 订阅转换器</h1>
        <p class="text-sm text-gray-400 mb-6 text-center">
            将订阅节点中的域名无缝替换为您优选的 IP 或域名列表<br>(无需存储，纯静态转换)
        </p>
        
        <div class="space-y-5">
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">原始 VLESS 订阅链接</label>
                <input type="url" id="subUrl" oninput="generate()" class="block w-full border border-gray-600 bg-gray-700 text-white rounded-md shadow-sm p-2.5 focus:ring-blue-500 focus:border-blue-500 placeholder-gray-400 outline-none" placeholder="https://xx.yy.zz:2096/subs/xxx">
            </div>
            <div>
                <label class="block text-sm font-medium text-gray-300 mb-1">目标 IP/域名 列表 (多个请用逗号或换行分隔)</label>
                <textarea id="newIp" rows="3" oninput="generate()" class="block w-full border border-gray-600 bg-gray-700 text-white rounded-md shadow-sm p-2.5 focus:ring-blue-500 focus:border-blue-500 placeholder-gray-400 outline-none resize-y" placeholder="1.1.1.1, example.com&#10;或者每行一个"></textarea>
                <p id="errorMsg" class="mt-2 text-xs text-red-400 hidden"></p>
            </div>
        </div>

        <div id="result" class="mt-8 hidden">
            <div class="border-t border-gray-700 pt-6" id="linksContainer">
                <!-- 这里将通过 JS 动态插入生成的链接 -->
            </div>
        </div>
    </div>

    <script>
        // Cookie 辅助函数
        function setCookie(name, value, days) {
            const d = new Date();
            d.setTime(d.getTime() + (days * 24 * 60 * 60 * 1000));
            document.cookie = name + "=" + encodeURIComponent(value) + ";expires=" + d.toUTCString() + ";path=/";
        }

        function getCookie(name) {
            const nameEQ = name + "=";
            const ca = document.cookie.split(';');
            for (let i = 0; i < ca.length; i++) {
                let c = ca[i].trim();
                if (c.indexOf(nameEQ) === 0) return decodeURIComponent(c.substring(nameEQ.length));
            }
            return "";
        }

        // 页面加载时恢复保存的数据
        document.addEventListener('DOMContentLoaded', () => {
            const savedUrl = getCookie('subUrl');
            const savedIps = getCookie('newIp');
            if (savedUrl) document.getElementById('subUrl').value = savedUrl;
            if (savedIps) document.getElementById('newIp').value = savedIps;
            if (savedUrl || savedIps) generate();
        });

        function isValid(str) {
            const ipRegex = /^(?:(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)\.){3}(?:25[0-5]|2[0-4][0-9]|[01]?[0-9][0-9]?)$/;
            const ipv6Regex = /^(([0-9a-fA-F]{1,4}:){7,7}[0-9a-fA-F]{1,4}|([0-9a-fA-F]{1,4}:){1,7}:|([0-9a-fA-F]{1,4}:){1,6}:[0-9a-fA-F]{1,4}|([0-9a-fA-F]{1,4}:){1,5}(:[0-9a-fA-F]{1,4}){1,2}|([0-9a-fA-F]{1,4}:){1,4}(:[0-9a-fA-F]{1,4}){1,3}|([0-9a-fA-F]{1,4}:){1,3}(:[0-9a-fA-F]{1,4}){1,4}|([0-9a-fA-F]{1,4}:){1,2}(:[0-9a-fA-F]{1,4}){1,5}|[0-9a-fA-F]{1,4}:((:[0-9a-fA-F]{1,4}){1,6})|:((:[0-9a-fA-F]{1,4}){1,7}|:)|fe80:(:[0-9a-fA-F]{0,4}){0,4}%[0-9a-zA-Z]{1,}|::(ffff(:0{1,4}){0,1}:){0,1}((25[0-5]|(2[0-4]|1{0,1}[0-9]){0,1}[0-9])\.){3,3}(25[0-5]|(2[0-4]|1{0,1}[0-9]){0,1}[0-9])|([0-9a-fA-F]{1,4}:){1,4}:((25[0-5]|(2[0-4]|1{0,1}[0-9]){0,1}[0-9])\.){3,3}(25[0-5]|(2[0-4]|1{0,1}[0-9]){0,1}[0-9]))$/;
            const domainRegex = /^(?:[a-z0-9](?:[a-z0-9-]{0,61}[a-z0-9])?\.)+[a-z]{2,63}$/i;
            return ipRegex.test(str) || ipv6Regex.test(str) || domainRegex.test(str);
        }

        async function generate() {
            const subUrl = document.getElementById('subUrl').value.trim();
            const ip = document.getElementById('newIp').value.trim();
            const resultDiv = document.getElementById('result');
            const errorMsg = document.getElementById('errorMsg');
            
            if (!subUrl || !ip) {
                resultDiv.classList.add('hidden');
                errorMsg.classList.add('hidden');
                return;
            }

            // 保存用户的输入到 Cookie，有效期 180 天
            setCookie('subUrl', subUrl, 180);
            setCookie('newIp', ip, 180);

            try {
                const rawList = ip.split(/[,\n]/).map(i => i.trim()).filter(Boolean);
                const validList = [];
                const invalidList = [];

                rawList.forEach(item => {
                    if (isValid(item)) {
                        validList.push(item);
                    } else {
                        invalidList.push(item);
                    }
                });

                // 显示非法输入提示
                if (invalidList.length > 0) {
                    errorMsg.innerText = `⚠️ 以下输入无效并将被忽略: ${invalidList.join(', ')}`;
                    errorMsg.classList.remove('hidden');
                } else {
                    errorMsg.classList.add('hidden');
                }
                
                if (validList.length === 0) {
                    resultDiv.classList.add('hidden');
                    return;
                }

                const linksContainer = document.getElementById('linksContainer');
                const unifiedUrl = window.location.origin + '/sub?url=' + encodeURIComponent(subUrl) + '&ips=' + encodeURIComponent(validList.join(','));
                
                linksContainer.innerHTML = createLinkHTML('🎉 您的二次订阅链接：', unifiedUrl, 'unified');
                resultDiv.classList.remove('hidden');

                // 生成二维码
                new QRious({
                    element: document.getElementById('qr_unified'),
                    value: unifiedUrl,
                    size: 200,
                    background: '#ffffff',
                    foreground: '#111827'
                });
            } catch (error) {
                console.error('生成失败:', error);
            }
        }

        // 辅助函数：生成单条链接的 HTML 结构
        function createLinkHTML(title, url, idPrefix) {
            return `
                <div class="mb-4">
                    <label class="block text-sm font-bold text-gray-200 mb-2">${title}</label>
                    <div class="flex mb-4">
                        <input type="text" id="url_${idPrefix}" value="${url}" readonly class="block w-full border border-gray-600 rounded-l-md shadow-sm p-2 bg-gray-900 text-gray-300 outline-none text-sm focus:ring-blue-500 focus:border-blue-500">
                        <button onclick="copyUrl('url_${idPrefix}')" class="bg-emerald-500 text-white px-5 rounded-r-md hover:bg-emerald-600 transition font-medium whitespace-nowrap">复制</button>
                    </div>
                    <div class="flex justify-center bg-white p-2 rounded-lg w-fit mx-auto">
                        <canvas id="qr_${idPrefix}"></canvas>
                    </div>
                </div>
            `;
        }

        function copyUrl(elementId) {
            const urlInput = document.getElementById(elementId);
            urlInput.select();
            urlInput.setSelectionRange(0, 99999);
            document.execCommand('copy');
            alert('复制成功！您可以将其粘贴到 V2Ray 等客户端中。');
        }
    </script>
</body>
</html>
